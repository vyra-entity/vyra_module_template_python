_subdirectory: "."
_answers_file: "{{ module_name }}/.copier-answers.yml"
_skip_if_exists: []
_jinja_extension: jinja2.ext.do
_templates_suffix: ""
# HOW COPIER RESOLVES THE TEMPLATE SOURCE:
# When running `copier copy <local-path> <dest>` WITHOUT --vcs-ref, copier picks the
# HIGHEST PEP 440 git tag in the template repo (via get_latest_tag). It does NOT use
# the working tree or HEAD automatically. To ensure copier uses the latest committed
# template, always create a new version tag at HEAD BEFORE running copier copy:
#   git tag v<major>.<minor>.<patch> HEAD    # must be higher than all existing tags
#
# To force a specific version (e.g. local HEAD):
#   copier copy <template> <dest> --trust --vcs-ref HEAD
#
# USAGE:
# The template wraps all files inside a `{{ module_name }}/` directory, so you only
# need to point copier at the *parent* folder (e.g. module-storages/) without
# specifying a subdir name — the module_name is used automatically:
#
#   copier copy ~/VYRA/vyra_module_template module-storages/ --trust --vcs-ref HEAD
#
# post_copier_setup.sh then renames  module-storages/<module_name>/
#   → module-storages/<module_name>_<uuid>/<version>/
#
# NOTE for `copier update`: The destination module directory must be its own git repo
# (i.e. not inside a parent repo with the module path gitignored). If the module is in
# a gitignored path (e.g. module-storages/), copier's git diff-tree will fail with
# exit code 128. Fix: run `git init && git add -A && git commit -m init` in the module
# dir first, then run `copier update --trust --defaults --vcs-ref HEAD`.

# === Pflichtfelder ===

module_name:
  type: str
  help: "Modul-Name (snake_case, z.B. my_detector)"
  validator: "{% if not (module_name | regex_search('^[a-z][a-z0-9_]*$')) %}Nur Kleinbuchstaben, Zahlen und Unterstriche erlaubt{% endif %}"

module_display_name:
  type: str
  help: "Anzeigename (z.B. My Detector Module)"
  default: "{{ module_name | replace('_', ' ') | title }}"

module_description:
  type: str
  help: "Kurze Beschreibung des Moduls (für README und metadata)"

module_version:
  type: str
  help: "Benutze Semantic Versioning (z.B. 1.0.0) [Major.Minor.Patch] - Kein Build-Metadaten oder Prä-Release-Tags"
  default: "1.0.0"
  validator: "{% if not (module_version | regex_search('^\\d+\\.\\d+\\.\\d+$')) %}Version muss im Format X.Y.Z sein (z.B. 1.0.0){% endif %}"

module_blueprints:
  type: str
  help: "Welches Blueprint(s) soll als Basis verwendet werden? (kommagetrennt, z.B. basic  oder basic,production-line-1)"
  validator: "{% if not (module_blueprints | regex_search('^[a-z][a-z0-9_]*(,[a-z][a-z0-9_]*)*$')) %}Nur Kleinbuchstaben, Zahlen und Unterstriche erlaubt; mehrere Werte kommagetrennt{% endif %}"

author_name:
  type: str
  help: "Dein Name"

author_email:
  type: str
  help: "Deine E-Mail-Adresse"

# === Optionale Feature-Flags ===

enable_frontend:
  type: bool
  help: "Soll ein Webinterface eingebunden werden?"
  default: true

enable_dev_mode:
  type: bool
  help: "Soll im Entwicklungsmodus gestartet werden? (Vite - Frontend Dev Server + Hot-Reload)"
  default: true

enable_slim_mode:
  type: bool
  help: "Soll der Slim-Modus als Standard gesetzt werden? (ohne ROS2, nur Python - ideal für ressourcenbeschränkte Module)"
  default: false

build_after_copy:
  type: bool
  help: "Soll das Docker-Image nach dem Erstellen automatisch gebaut werden? (beide Varianten: development + production)"
  default: true

publish_to_repo_after_copy:
  type: bool
  help: "Soll das Modul nach dem Bauen automatisch ins lokale Repository geladen werden?"
  default: true

# === Interne/abgeleitete Variablen (keine Abfrage) ===
# Nutzung in Templates:
# {{ module_name }}                           → my_detector
# {{ module_display_name }}                   → My Detector Module
# {{ module_name | replace('_', '-') }}       → my-detector  (entrypoint name)
# {{ module_name | title | replace('_','') }} → MyDetector   (Klassenname)

# docs und examples sollen in das neue modul mit übernommen werden, damit man
# dort direkt loslegen kann. Daher werden sie nicht ausgeschlossen, sondern 
# als Hilfe für die Nutzer bereitgestellt. In der .gitignore des Moduls werden 
# sie dann ausgeschlossen, damit sie nicht ins Repository gelangen.


_exclude:
  - "README.md"
  - "CHANGELOG.md"
  - "{% if not enable_frontend %}{{ module_name }}/frontend/**{% endif %}"
  - "{% if not enable_frontend %}{{ module_name }}/config/nginx.conf{% endif %}"
  - "{% if not enable_frontend %}{{ module_name }}/src/{{ module_name }}/{{ module_name }}/backend_webserver/**{% endif %}"
  - "copier.yml"
  - ".git"
  - ".git/**"
  - ".github/**"
  - "{{ module_name }}/build/**"
  - "{{ module_name }}/install/**"
  - "log"
  - "log/**"
  - "debug.log"
  - "debug2.log"
  - ".env"
  - ".copier-answers.yml"

_tasks:
  - "cp {{ module_name }}/.env.example {{ module_name }}/.env"
  - "chmod +x {{ module_name }}/tools/*.sh"
  - "echo '✅ Modul {{ module_name }} wurde erstellt!'"
  - "echo '⚙️  Führe Post-Setup durch (UUID generieren, Verzeichnis umbenennen)...'"
  - "bash {{ module_name }}/tools/post_copier_setup.sh{% if build_after_copy %} --build{% endif %}{% if publish_to_repo_after_copy %} --publish{% endif %}"
