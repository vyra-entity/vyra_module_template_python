# Ruff configuration for {{ module_name }}
# Modern, fast Python linter and code formatter

# Target Python 3.10+
target-version = "py310"

# Line length
line-length = 100

# Enable auto-fixing
fix = true

# Output format
output-format = "concise"

[lint]
# Core rules enforced in CI; stricter groups (EM, PTH, TID, RET, …) are
# deferred until the legacy codebase is cleaned up incrementally.
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "T10",  # flake8-debugger
]

# Ignore specific rules
ignore = [
    "E501",    # line too long (handled by formatter)
    "E402",    # module import not at top (ROS2 / lazy imports)
    "F841",    # unused variable (often intentional placeholders)
    "ISC001",  # conflicts with ruff formatter
    "B008",    # function call in argument default (FastAPI Depends)
    "B007",    # unused loop control variable
    "B904",    # raise without from inside except
    "UP038",   # isinstance X | Y (keep tuple form for py3.10 compat)
    "PLR0913", # too many arguments
    "PLR0912", # too many branches
    "PLR0915", # too many statements
    "PLR2004", # magic value comparison
    "N812",    # lowercase imported as non lowercase (ROS2 convention)
]

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# Per-file ignores
[lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]  # Allow unused imports in __init__.py
"tests/*" = ["ARG001", "B017", "S101"]  # Allow unused args, broad raises, and assert in tests
"src/{{ module_name }}/{{ module_name }}/plugin/plugin_gateway.py" = ["F401"]  # wasmtime optional import probe

[lint.isort]
# Import sorting configuration
known-first-party = ["{{ module_name }}", "vyra_base"]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder"
]

[lint.pydocstyle]
# Docstring style
convention = "google"

[format]
# Format settings
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
