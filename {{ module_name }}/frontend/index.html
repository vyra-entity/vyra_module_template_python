<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VYRA {{ module_display_name }}</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
    <!-- Modern CSS Reset und Base Styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0b111e;
            min-height: 100dvh;
        }
        
        #app {
            min-height: 100dvh;
        }

        /* ── Industrial Loading Screen ── */
        .vyra-loading {
            position: fixed;
            inset: 0;
            z-index: 9999;
            overflow: hidden;
            background: #0b111e;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.35s ease;
        }
        .vyra-loading.fade-out { opacity: 0; pointer-events: none; }
        .vl-iso {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        .vl-panel {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: vl-rise 0.3s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes vl-rise {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .vl-logo-wrap {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(100,121,132,0.35);
            background: rgba(11,17,30,0.82);
            position: relative;
            margin-bottom: 20px;
            animation: vl-logo-in 0.4s 0.05s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes vl-logo-in {
            from { opacity: 0; transform: scale(0.88); }
            to   { opacity: 1; transform: scale(1); }
        }
        .vl-logo-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 0%, rgba(100,171,200,0.18) 50%, transparent 100%);
            transform: translateY(-100%);
            animation: vl-scan-logo 0.5s 0.2s cubic-bezier(0.4,0,0.6,1) forwards;
        }
        @keyframes vl-scan-logo {
            from { transform: translateY(-100%); opacity: 1; }
            to   { transform: translateY(100%);  opacity: 0; }
        }
        .vl-logo-wrap::before {
            content: '';
            position: absolute;
            inset: -3px;
            border: 1px solid rgba(100,171,200,0.5);
            animation: vl-glow-pulse 1.8s 0.3s ease-in-out infinite;
        }
        @keyframes vl-glow-pulse {
            0%,100% { opacity: 0.3; }
            50%     { opacity: 0.8; }
        }
        .vl-wordmark {
            margin-bottom: 22px;
            animation: vl-fade-in 0.4s 0.15s both;
        }
        @keyframes vl-fade-in {
            from { opacity: 0; } to { opacity: 1; }
        }
        .vl-status {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 14px;
            animation: vl-fade-in 0.4s 0.2s both;
        }
        .vl-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #5aafcf;
            animation: vl-blink 0.7s 0.3s ease-in-out infinite alternate;
        }
        @keyframes vl-blink {
            from { opacity: 0.25; } to { opacity: 1; }
        }
        .vl-status-txt {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            letter-spacing: 0.18em;
            color: rgba(160,185,200,0.7);
            text-transform: uppercase;
        }
        .vl-prog-track {
            width: 180px;
            height: 2px;
            background: rgba(100,121,132,0.2);
            position: relative;
            overflow: hidden;
            animation: vl-fade-in 0.3s 0.1s both;
        }
        .vl-prog-bar {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 0;
            background: linear-gradient(90deg, rgba(90,175,207,0.6) 0%, #5aafcf 100%);
            animation: vl-prog 0.95s 0.05s cubic-bezier(0.4,0,0.2,1) forwards;
        }
        @keyframes vl-prog {
            from { width: 0; }
            to   { width: 86%; }
        }
        .vl-scan {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(90,175,207,0.04) 40%,
                rgba(90,175,207,0.06) 50%,
                rgba(90,175,207,0.04) 60%,
                transparent 100%);
            transform: translateY(-100%);
            animation: vl-fullscan 1.1s 0.1s cubic-bezier(0.4,0,0.6,1) forwards;
            pointer-events: none;
            z-index: 3;
        }
        @keyframes vl-fullscan {
            from { transform: translateY(-100%); }
            to   { transform: translateY(100%); }
        }
        
        /* Fallback für wenn Vue.js nicht lädt */
        .fallback-dashboard {
            padding: 3rem;
            text-align: center;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin: 2rem;
            max-width: 800px;
            margin: 2rem auto;
        }
        
        .fallback-dashboard h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        
        .fallback-dashboard p {
            color: #7f8c8d;
            margin-bottom: 2rem;
        }
        
        .api-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .api-button {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .api-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
